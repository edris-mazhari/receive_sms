name: receive_sms
description: "A Flutter plugin to receive and send SMS messages on Android."
version: 1.4.0
repository: https://github.com/edris-mazhari/receive_sms
license: MIT

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

platforms:
  android:

flutter:
  plugin:
    platforms:
      android:
        package: com.receivesms.receive_sms
        pluginClass: ReceiveSmsPlugin
